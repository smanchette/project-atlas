services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas_postgres
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_password
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: atlas_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://atlas:atlas_password@postgres:5432/atlas
      FRONTEND_ORIGIN: http://localhost:5173
      ATLAS_PROGRAM_ROOT: /atlas-program
      ATLAS_RELEASE_MANIFEST_PATH: /atlas-runtime/atlas-release.json
      ATLAS_RELEASE_MANIFEST_SHA256: ${ATLAS_RELEASE_MANIFEST_SHA256:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./wordpress:/atlas-program/wordpress:ro
      - ./backend/app:/atlas-program/backend/app:ro
      - ./backend/alembic:/atlas-program/backend/alembic:ro
      - ./backend/tests:/atlas-program/backend/tests:ro
      - ./backend/scripts:/atlas-program/backend/scripts:ro
      - ./frontend/src:/atlas-program/frontend/src:ro
      - ./backend/Dockerfile:/atlas-program/backend/Dockerfile:ro
      - ./backend/.dockerignore:/atlas-program/backend/.dockerignore:ro
      - ./backend/alembic.ini:/atlas-program/backend/alembic.ini:ro
      - ./backend/requirements.txt:/atlas-program/backend/requirements.txt:ro
      - ./frontend/Dockerfile:/atlas-program/frontend/Dockerfile:ro
      - ./frontend/package.json:/atlas-program/frontend/package.json:ro
      - ./frontend/package-lock.json:/atlas-program/frontend/package-lock.json:ro
      - ./frontend/index.html:/atlas-program/frontend/index.html:ro
      - ./frontend/tsconfig.json:/atlas-program/frontend/tsconfig.json:ro
      - ./frontend/vite.config.ts:/atlas-program/frontend/vite.config.ts:ro
      - ./docker-compose.yml:/atlas-program/docker-compose.yml:ro
      - ./README.md:/atlas-program/README.md:ro
      - ./.runtime:/atlas-runtime:ro
      - ./frontend/public/media:/frontend/public/media:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: atlas_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  atlas_postgres_data:
